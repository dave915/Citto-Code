<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>Routing Demo Fixture</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }

      nav {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 16px 24px;
        background: #1e293b;
      }

      .page {
        max-width: 720px;
        margin: 0 auto;
        padding: 48px 24px 80px;
      }

      .card {
        margin-bottom: 16px;
        padding: 24px;
        border-radius: 12px;
        background: #1e293b;
      }

      .avatar {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 72px;
        height: 72px;
        border-radius: 999px;
        background: linear-gradient(135deg, #0ea5e9, #8b5cf6);
      }

      #toast {
        position: fixed;
        right: 24px;
        bottom: 24px;
        padding: 12px 16px;
        border-radius: 10px;
        background: #1e293b;
      }
    </style>
  </head>
  <body>
    <nav>
      <strong>LocalServer</strong>
      <span>/about</span>
    </nav>

    <div class="page">
      <div class="card">
        <h1>Home</h1>
        <p>Body only uses min-height: 100vh. Child components use flex centering and a fixed toast.</p>
      </div>
      <div class="card">
        <div class="avatar">A</div>
      </div>
      <div class="card" style="min-height: 260px"></div>
      <div class="card" style="min-height: 260px"></div>
    </div>

    <div id="toast">301 Redirect</div>
  </body>
</html>
